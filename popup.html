<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeTracker 30</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b80;
  }

  body {
    width: 360px;
    min-height: 500px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  .header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #0d0d18 0%, #0a0a0f 100%);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
    box-shadow: 0 0 6px var(--green);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .dashboard-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .dashboard-btn:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .today-header {
    padding: 14px 18px 0;
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .today-label {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .today-date {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--accent);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 10px 18px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.6;
  }

  .stat-card.orange::before { background: var(--accent2); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.red::before { background: var(--red); }

  .stat-value {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
    font-family: 'Space Mono', monospace;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .stat-sub {
    font-size: 9px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 2px;
  }

  .section-title {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 18px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .top-sites {
    padding: 0 18px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .site-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .site-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(124,106,247,0.12), transparent);
    transition: width 0.5s ease;
  }

  .site-rank {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    width: 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .site-favicon {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    background: var(--surface2);
  }

  .site-name {
    flex: 1;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    z-index: 1;
  }

  .site-time {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .site-visits {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .hourly-chart {
    padding: 0 18px 14px;
  }

  .bar-row {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 40px;
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    height: 100%;
    justify-content: flex-end;
  }

  .bar-fill {
    width: 100%;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    min-height: 1px;
    transition: height 0.4s ease;
    opacity: 0.7;
  }

  .bar-fill.now {
    background: var(--accent2);
    opacity: 1;
    box-shadow: 0 0 6px var(--accent2);
  }

  .bar-label {
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    color: var(--muted);
    text-align: center;
  }

  .loading {
    padding: 40px 18px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
  }

  .no-data {
    padding: 30px 18px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    line-height: 1.8;
  }

  .searches-list {
    padding: 0 18px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .search-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
  }

  .search-engine {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--accent2);
    background: rgba(247,162,106,0.1);
    padding: 2px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .search-query {
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .footer {
    padding: 8px 18px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-stat {
    text-align: center;
  }

  .footer-val {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }

  .footer-lbl {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .divider { width: 1px; height: 28px; background: var(--border); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">LifeTracker 30</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="live-dot"></div>
    <button class="dashboard-btn" id="dashBtn">FULL REPORT →</button>
  </div>
</div>

<div id="content">
  <div class="loading">Loading your activity...</div>
</div>

<script src="popup.js"></script>
</body>
</html>
